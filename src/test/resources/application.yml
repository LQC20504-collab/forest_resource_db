# MyBatis configuration for tests
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: edu.hznu.forest.entity
  configuration:
    map-underscore-to-camel-case: true

# H2 in-memory database
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Don't auto-replace datasource
  test:
    database:
      replace: NONE

  # Prevent the main MySQL schema.sql from auto-executing on H2
  sql:
    init:
      mode: never
