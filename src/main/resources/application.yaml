server:
  port: 8081

spring:
  application:
    name: forest-resource-db
  datasource:
    url: jdbc:mysql://localhost:3306/forest_resource?sslMode=DISABLED&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_general_ci
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: edu.hznu.forest.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ForestResourceDb2026SecretKeyForJWTTokenGeneration
  expiration: 86400000

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

logging:
  level:
    edu.hznu.forest.mapper: INFO

ai:
  predict:
    url: http://localhost:5000/predict
