<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>行政区管理 — AI森林资源调查数据库</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ===== admin-regions.html — Page-Specific Styles ===== */
.admin-regions-page .navbar {
  background: rgba(27, 67, 50, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06);
}
.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--space-8) var(--space-6);
}
.action-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: var(--space-6);
  flex-wrap: wrap;
}
.action-bar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
td.actions {
  display: flex;
  gap: 4px;
}
td.region-name {
  font-weight: 600;
  color: var(--color-primary-dark);
}
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,31,28,0.55);
  backdrop-filter: blur(2px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  max-height: 85vh;
  overflow-y: auto;
  width: 480px;
  max-width: 95vw;
  animation: slideUp 0.25s ease;
}
.modal-header {
  padding: 20px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-header h2 { font-size: 18px; font-weight: 700; color: var(--color-text); }
.modal-close {
  width: 32px; height: 32px;
  border: none; background: none;
  font-size: 20px; color: var(--color-text-muted);
  cursor: pointer; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition-fast);
}
.modal-close:hover { background: #f0eeea; color: var(--color-text); }
.modal-body { padding: 20px 24px; }
.modal-footer {
  padding: 0 24px 20px;
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.form-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-group label {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text-secondary);
  letter-spacing: 0.2px;
}
.form-group input, .form-group select {
  padding: 9px 12px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  color: var(--color-text);
  background: var(--color-surface);
  transition: border-color var(--transition-fast);
  font-family: inherit;
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(44,110,73,0.1);
}
.form-group input.error, .form-group select.error {
  border-color: var(--color-error);
}
.field-error {
  font-size: 12px;
  color: var(--color-error);
  display: none;
}
.form-group input.error + .field-error,
.form-group select.error + .field-error {
  display: block;
}
.loading-row td {
  text-align: center;
  padding: 32px;
}
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--color-text-muted);
}
.empty-state .empty-icon {
  font-size: 48px;
  margin-bottom: 12px;
  opacity: 0.4;
}
.empty-state p {
  font-size: 14px;
}
@media (max-width: 768px) {
  .main { padding: var(--space-6) var(--space-4); }
  .action-bar { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body class="admin-regions-page">

<nav class="navbar">
  <a href="dashboard.html" class="navbar-brand">
    <span class="logo-icon">&#9730;</span>
    <span>AI森林资源调查系统</span>
  </a>
  <div class="navbar-nav">
    <a href="dashboard.html">仪表盘</a>
    <a href="plots.html">样地管理</a>
    <a href="map.html">样地地图</a>
    <a href="statistics.html">分区统计</a>
    <a href="admin-regions.html" class="active">行政区管理</a>
    <a href="admin-species.html">树种管理</a>
    <a href="models.html">模型目录</a>
    <a href="operation-logs.html">操作日志</a>
  </div>
  <div class="navbar-user">
    <span id="navbarUsername">用户</span>
    <button class="btn-logout" onclick="window.handleLogout()">退出登录</button>
  </div>
</nav>

<main class="main">
  <div class="page-header">
    <h1>行政区管理</h1>
    <p>管理系统中的行政区划数据 — 新建、编辑和删除区域信息</p>
  </div>

  <div class="action-bar">
    <div class="action-bar-left">
      <button class="btn btn-primary" onclick="window.openCreateModal()">
        + 新建区域
      </button>
    </div>
  </div>

  <div class="table-container">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>区域名称</th>
            <th>父级区域</th>
            <th>层级</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="regionTableBody">
          <tr class="loading-row">
            <td colspan="5">
              <div class="spinner"></div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- ===== CREATE/EDIT MODAL ===== -->
<div class="modal-overlay" id="formModalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="formModalTitle">新建区域</h2>
      <button class="modal-close" onclick="window.closeFormModal()">&times;</button>
    </div>
    <div class="modal-body">
      <form id="regionForm" onsubmit="return false;" novalidate>
        <input type="hidden" id="formRegionId" value="">
        <div class="form-grid">
          <div class="form-group">
            <label for="formRegionName">区域名称 *</label>
            <input type="text" id="formRegionName" required maxlength="100" placeholder="例如: 浙江省">
            <span class="field-error">请输入区域名称</span>
          </div>
          <div class="form-group">
            <label for="formParentRegion">父级区域</label>
            <select id="formParentRegion">
              <option value="">（无 — 顶级区域）</option>
            </select>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-outline" onclick="window.closeFormModal()">取消</button>
      <button type="button" class="btn btn-primary" id="formSubmitBtn" onclick="window.handleFormSubmit()">保存</button>
    </div>
  </div>
</div>

<!-- ===== DELETE CONFIRM MODAL ===== -->
<div class="modal-overlay" id="deleteModalOverlay">
  <div class="modal" style="width:440px">
    <div class="modal-header">
      <h2>确认删除</h2>
      <button class="modal-close" onclick="window.closeDeleteModal()">&times;</button>
    </div>
    <div class="modal-body">
      <p style="font-size:14px;color:var(--color-text-secondary);">
        确定要删除区域 "<strong id="deleteRegionName" style="color:var(--color-danger);"></strong>" 吗？
      </p>
      <p style="font-size:13px;color:var(--color-text-muted);margin-top:8px;">
        此操作不可恢复。如果有样地关联到此区域，删除将失败。
      </p>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-outline" onclick="window.closeDeleteModal()">取消</button>
      <button type="button" class="btn btn-danger" id="deleteConfirmBtn" onclick="window.confirmDelete()">确认删除</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/admin-regions.js"></script>
</body>
</html>
